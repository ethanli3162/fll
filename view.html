<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>
        Metadata
    </title>
    <style>
        @font-face {
            font-family: 'Mona Sans';
            src:
                url('/assets/font.woff2') format('woff2 supports variations'),
                url('/assets/font.woff2') format('woff2-variations');
            font-weight: 200 900;
            font-stretch: 75% 125%;
        }

        @font-face {
            font-family: 'Hubot Sans';
            src:
                url('/assets/font.woff2') format('woff2 supports variations'),
                url('/assets/font.woff2') format('woff2-variations');
            font-weight: 200 900;
            font-stretch: 75% 125%;
        }
        :root {
            --table-header-color: rgb(237, 195, 129);
        }
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            overflow: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url('/assets/');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            opacity: 1;
            pointer-events: none;
        }
        .split {
            display: flex;
            width: 100vw;
            height: 100vh;
            margin: 0;
            position: relative;
            z-index: 1;
        }
        .split .left,
        .split .right {
            flex: 1 1 50%;
            position: relative;
            overflow: hidden;
            min-width: 0;
        }
        .split .left model-viewer {
            width: 100%;
            height: 100%;
            display: block;
        }
        .split .right {
            overflow-y: auto;
            padding: 20px;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .split .right .background {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        #metadata table {
            width: 100%;
            min-width: 600px;
            margin: 0 auto;
            border-collapse: collapse;
            font-family: 'Mona Sans', 'Hubot Sans';
            font-size: 0.5em;
            table-layout: auto;
        }
        #metadata table th,
        #metadata table td {
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
            padding: 8px 4px;
        }
        #metadata table th {
            background-color: var(--table-header-color);
            color: white;
            text-align: left;
            font-weight: bold;
            border: 1px solid #ddd;
            font-size: 0.8em;
        }
        #metadata table td {
            border: 1px solid #ddd;
            font-size: 0.7em;
        }
        #metadata table tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        #metadata table tr:hover {
            background-color: #ddd;
        }
        @media (max-width: 700px) {
            .split {
                flex-direction: column;
                height: 100vh;
            }
            .split .left,
            .split .right {
                height: 50vh;
            }
            #metadata table {
                font-size: 0.4em;
            }
            #metadata table th,
            #metadata table td {
                padding: 4px 2px;
            }
        }
        @media (max-width: 480px) {
            .split .right {
                padding: 10px;
            }
            #metadata table {
                font-size: 0.35em;
            }
            #metadata table th,
            #metadata table td {
                padding: 2px 1px;
            }
        }
    </style>
</head>
<body>

    <script type="module" src="/model.js"></script>
    <div class="split">
        <div class="left">
            <model-viewer id="artifactViewer" alt="Artifact" src="" ar environment-image="/assets/room.hdr" poster="" shadow-intensity="1" camera-controls touch-action="pan-y" auto-rotate camera-controls skybox-image="/assets/room.hdr"></model-viewer>
            <div class="controls glass">
                    <button onclick="exportGLB()">Export Model</button>
                  </div>
                </model-viewer>
                <script>
                    async function exportGLB() {
                        const modelViewer = document.getElementById("static-model");
                        const glTF = await modelViewer.exportScene();
                        const file = new File([glTF], "model.glb");
                        const link = document.createElement("a");
                        link.download = file.name;
                        link.href = URL.createObjectURL(file);
                        link.click();
                    }
                </script>
        </div>
        <div class="right" id="metadata">
            <div style="margin-bottom: 15px;">
                <label for="tableHeaderColor" style="font-size: 0.8em; display: block; margin-bottom: 5px;">Table Header Color:</label>
                <input type="color" id="tableHeaderColor" value="#4CAF50" style="width: 50px; height: 30px; cursor: pointer;">
            </div>
            <p>Loading metadata...</p>
        </div>
    </div>
</body>
</html>

<script>
    const colorPicker = document.getElementById('tableHeaderColor');
    colorPicker.addEventListener('change', (e) => {
        document.documentElement.style.setProperty('--table-header-color', e.target.value);
        localStorage.setItem('tableHeaderColor', e.target.value);
    });
    
    const savedColor = localStorage.getItem('tableHeaderColor');
    if (savedColor) {
        colorPicker.value = savedColor;
        document.documentElement.style.setProperty('--table-header-color', savedColor);
    }

    function getAssetPath() {
        const parts = location.pathname.split('/').filter(Boolean);
        if (parts.length === 0) {
            return null;
        }
        const assetName = parts[parts.length - 1];
        let fileName = assetName;
        if (!fileName.toLowerCase().endsWith('.glb')) {
            fileName += '.glb';
        }
        return `/models/${fileName}`;
    }

    const viewer = document.getElementById('artifactViewer');
    const assetPath = getAssetPath();

    if (assetPath) {

        fetch(assetPath, { method: 'HEAD' })
            .then(resp => {
                if (resp.ok) {
                    viewer.src = assetPath;
                } else {
                    console.error('Asset not found:', assetPath, resp.status);
                    viewer.alt = 'Asset not found';
                }
            })
            .catch(err => {
                console.error('Error checking asset:', err);
                viewer.alt = 'Error loading asset';
            });
    } else {
        console.warn('No pathname provided; using default asset');
        viewer.src = '/assets/rock.glb';
    }

    function getMetadataPath() {
        const parts = location.pathname.split('/').filter(Boolean);
        if (parts.length === 0) return null;
        let fileName = parts[parts.length - 1];
        if (!fileName.toLowerCase().endsWith('.json')) {
            fileName += '.json';
        }
        return `/data/${fileName}`;
    }

    const metadataContainer = document.getElementById('metadata');
    const metadataPath = getMetadataPath();

    function createTableFromJSON(data) {
        const tableWrapper = document.createElement('div');
        tableWrapper.style.overflowX = 'auto';
        tableWrapper.style.width = '100%';
        
        const table = document.createElement('table');
        
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        const th1 = document.createElement('th');
        th1.textContent = 'Properties';
        const th2 = document.createElement('th');
        th2.textContent = 'Data';
        headerRow.appendChild(th1);
        headerRow.appendChild(th2);
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        for (const [key, value] of Object.entries(data)) {
            const row = document.createElement('tr');
            const tdKey = document.createElement('td');
            tdKey.textContent = key;
            const tdValue = document.createElement('td');
            tdValue.textContent = typeof value === 'object' ? JSON.stringify(value) : value;
            row.appendChild(tdKey);
            row.appendChild(tdValue);
            tbody.appendChild(row);
        }
        table.appendChild(tbody);
        
        tableWrapper.appendChild(table);
        return tableWrapper;
    }

    if (metadataPath) {
        fetch(metadataPath)
            .then(resp => {
                if (!resp.ok) {
                    throw new Error(`Status ${resp.status}`);
                }
                return resp.json();
            })
            .then(data => {
                metadataContainer.textContent = '';
                const table = createTableFromJSON(data);
                metadataContainer.appendChild(table);
            })
            .catch(err => {
                console.error('Error loading metadata:', err);
                metadataContainer.textContent = 'Unable to load metadata';
            });
    } else {
        metadataContainer.textContent = 'No metadata path available';
    }

    console.log('location.href:', location.href);
    console.log('location.origin:', location.origin);
    console.log('location.pathname:', location.pathname);
    console.log('Asset path computed:', assetPath);
</script>
