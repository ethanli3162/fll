<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Dashboard</title>
    <script src="/images/tailwind.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            position: relative;
            background-image: url("/images/GUI.png");
            background-repeat: no-repeat; 
            background-size: cover; 
        }
        .button {
            top: 10px;
            width: 75%;
            padding-left: 25%;
            height: auto;
            cursor: pointer;
            z-index: 2;
            padding-top: 4%;
            padding-bottom: 3%;
        }
        .stopbutton {
            top: 10px;
            height: auto;
            cursor: pointer;
            z-index: 2;
            padding-top: 1%;
        }
        .title {
            width: 75%;
            padding-left: 25%;
            z-index: 2;
            padding-top: 5%;
        }
        .nodecontainer { 
			margin: 0 auto; 
			background: rgba(112, 112, 112, 0.95);
			padding: 1.5rem;
            max-width: 25%;
            height: auto;
            justify-content: center;
		}
        .center {
            justify-content: center;
        }
        .stop {
            padding-top: 1%;
        }
    </style>
    </head>
    <body>
        <div class="title top-[10px] hover:scale-[105%] transition-transform duration-300">
            <img src="/images/title.png" alt="">
        </div>
        <a id="scanLink" href="/scan/"><img class="button hover:scale-[105%] transition-transform duration-170" src="/images/button.png" alt="Start Scanning!"></a>
        <audio id="clickSound" preload="auto">
            <source src="https://artifactalliance.org/install/click.mp3" type="audio/mpeg">
        </audio>
        <div class="nodecontainer hover:scale-[105%] rounded-4xl hover:rounded-2xl transition-all transition-transform duration-300 shadow-lg ease-linear">
            <a href="/stop/"><img src="/images/stop.png" alt="" class="hover:scale-[105%] transition-transform duration-100"></a>
            <a href="/stop/"><h2 class="font-medium text-center stopbutton hover:font-bold hover:underline text-red-500 hover:text-red-700 hover:scale-[120%] transition-transform duration-100">STOP!</h2></a>
        </div>
        <script>
            (function(){
                const clickSound = document.getElementById('clickSound');
                function playClick(){
                    if(!clickSound) return;
                    clickSound.currentTime = 0;
                    clickSound.play().catch(e => console.warn('Sound play prevented:', e));
                }
                const scanLink = document.getElementById('scanLink') || document.querySelector('img.button')?.closest('a');
                if(scanLink){
                    scanLink.addEventListener('pointerdown', playClick);
                    scanLink.addEventListener('click', playClick);
                }
            })();
        </script>
    </body>
</html>
