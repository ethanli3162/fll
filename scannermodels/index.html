<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link type="text/plain" rel="author" href="/humans.txt" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
    <title>Scanner Pieces</title>
    <style>
        @font-face {
            font-family: 'Mona Sans';
            src:
                url('/assets/font.woff2') format('woff2 supports variations'),
                url('/assets/font.woff2') format('woff2-variations');
            font-weight: 200 900;
            font-stretch: 75% 125%;
        }

        @font-face {
            font-family: 'Hubot Sans';
            src:
                url('/assets/font.woff2') format('woff2 supports variations'),
                url('/assets/font.woff2') format('woff2-variations');
            font-weight: 200 900;
            font-stretch: 75% 125%;
        }

        html * {
            line-height: 1;
            font-family: 'Mona Sans', 'Hubot Sans';
            color: #000000;
        }

        body {
            background-color: rgba(237, 195, 129, 0.95);
            background-image: url('about:blank');
            background-repeat: no-repeat;
        }

        .action-bar {
            background-color: #8d4c00;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 10px;
        }

        .action-bar a {
            color: #ffffff;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .action-bar a:hover {
            text-decoration: underline;
        }

        .logo {
            height: 40px;
            border-radius: 50%;
        }
        .credits {
            padding-top: 10px;
            width: 100%;
            height: 700px;
        }
        .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-texts {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .top-item {
            margin: 0;
            color: #ffffff;
            font-weight: 600;
            font-size: 16px;
        }

        .big-header {
            font-family: 'Hubot Sans';
            font-size: 72px;
            text-align: center;
            margin-top: 50px;
        }

        .sub-header {
            font-family: 'Hubot Sans';
            font-size: 36px;
            text-align: center;
            margin-top: 20px;
        }

        .sub-sub-header {
            font-family: 'Hubot Sans';
            font-size: 24px;
            text-align: center;
            margin-top: 20px;
        }

        .sub-sub-sub-header {
            font-family: 'Hubot Sans';
            font-size: 14px;
            text-align: center;
            margin-top: 20px;
        }

        ::selection {
            background: rgba(48, 34, 18, 10);
            border-radius: 10px;
            padding: 10px;
            color: #8d4c00;
        }

        .body-image {
            display: block;
            max-width: 100%;
            height: auto;
            margin-left: auto;
            margin-right: auto;
        }

        .nodecontainer {
            margin: 0 auto;
            background: rgba(112, 112, 112, 0.95);
            padding: 1.5rem;
            border-radius: 8px;
            max-width: 150px;
            height: auto;
            justify-content: center;
        }

        .center {
            margin: 0 auto;
            border-radius: 0px;
            padding-right: 200px;
            max-width: 0px;
            height: auto;
            padding-top: 20px;
            justify-content: center;
        }

        .invisible {
            display: none;
        }

        .login-box input {
            border-radius: 12px;
            padding: 8px 12px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            outline: none;
            box-sizing: border-box;
            width: 100%;
            margin: 8px 0;
            font-size: 16px;
            max-width: 160px;
        }

        .login-box button {
            background-color: #8d4c00;
            color: #ffffff;
            border: none;
            border-radius: 24px;
            padding: 10px 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            max-width: 160px;
        }

        .login-box button:hover {
            filter: brightness(0.95);
        }
        .model {
            width: 1000px;
            height: 600px;
            margin: 20px auto;
            
        }
    </style>
</head>
<header>
    <div class="action-bar">
        <div class="left">
            <a href="/"><img src="/assets/favicon.png" alt="Logo" class="logo"></a>
        </div>
</header>

<body>
    <div class="sub-sub-header p-4 underline hover:scale-105 transition-transform duration-300 hover:bold">
        Scanner Peices:
    </div>
    <model-viewer id="red" class="model" alt="base.glb" src="/scannermodels/base.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="grey" class="model" alt="bevelgear.glb" src="/scannermodels/bevelgear.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="red" class="model" alt="bevelholder.glb" src="/scannermodels/bevelholder.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="red" class="model" alt="bridge.glb" src="/scannermodels/bridge.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="red" class="model" alt="camera.glb" src="/scannermodels/camera.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="red" class="model" alt="cameramount.glb" src="/scannermodels/cameramount.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="red" class="model" alt="holderending.glb" src="/scannermodels/holderending.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="red" class="model" alt="holderextention.glb" src="/scannermodels/holderextention.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="red" class="model" alt="holderpiece.glb" src="/scannermodels/holderpiece.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="red" class="model" alt="picase.glb" src="/scannermodels/picase.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="blue" class="model" alt="ringgear.glb" src="/scannermodels/ringgear.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="blue" class="model" alt="ringholder.glb" src="/scannermodels/ringholder.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="blue" class="model" alt="ringpiece.glb" src="/scannermodels/ringpiece.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    <model-viewer id="red" class="model" alt="stringholder.glb" src="/scannermodels/stringholder.glb" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>

    <script>
        const modelViewerRed = document.querySelectorAll("#red");
        modelViewerRed.forEach(modelViewerColor => {
            modelViewerColor.addEventListener("load", () => {
                const [material] = modelViewerColor.model.materials;
                material.pbrMetallicRoughness.setBaseColorFactor("#e91d2d");
            });
        });
        const modelViewerBlue = document.querySelectorAll("#blue");
        modelViewerBlue.forEach(modelViewerColor => {
            modelViewerColor.addEventListener("load", () => {
                const [material] = modelViewerColor.model.materials;
                material.pbrMetallicRoughness.setBaseColorFactor("#3b55a3");
            });
        });
        const modelViewerGrey = document.querySelectorAll("#grey");
        modelViewerGrey.forEach(modelViewerColor => {
            modelViewerColor.addEventListener("load", () => {
                const [material] = modelViewerColor.model.materials;
                material.pbrMetallicRoughness.setBaseColorFactor("#61676a");
            });
        });
    </script>
</body>

</html>
